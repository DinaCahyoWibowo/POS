<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 420px; margin: 80px auto; }
    </style>
</head>
<body>

<div class="card shadow-sm">
    <div class="card-body">
        <h3 class="card-title mb-3 text-center">Sign in</h3>

        
        <form method="POST" action="http://127.0.0.1:8000/login">
            <input type="hidden" name="_token" value="mqmS678WUGRRXqACaHP9vz3JGykNSawxZPNHlC25" autocomplete="off">
            <div class="mb-3">
                <label for="login" class="form-label">Username or Email</label>
                <input id="login" name="login" type="text" value="" required autofocus class="form-control">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" required class="form-control">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" name="remember" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Login</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
